[project]
name = "icecode-server"
version = "2.0.0"
description = "ICECODE Server — FastAPI backend, REST API, SSE streaming"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "aiofiles>=24.1.0",
    "httpx>=0.27.0",
    "loguru>=0.7.2",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "python-multipart>=0.0.20",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.20.0",
    "orjson>=3.10.0",
    "icecode-core>=2.0.0",
]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["icecode_server*"]
