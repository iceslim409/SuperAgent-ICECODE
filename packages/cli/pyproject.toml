[project]
name = "icecode-cli"
version = "2.0.0"
description = "ICECODE CLI — command-line interface for the ICECODE Agent"
requires-python = ">=3.11"
dependencies = [
    "icecode-core",
    "click>=8.0",
    "rich>=13.0",
    "prompt-toolkit>=3.0",
]

[project.scripts]
icecode = "icecode_cli.hermes_cli.main:main"
hermes  = "icecode_cli.hermes_cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["icecode_cli"]
