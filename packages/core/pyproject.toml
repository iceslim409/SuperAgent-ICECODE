[project]
name = "icecode-core"
version = "2.0.0"
description = "ICECODE Core — Python AI agent engine, memory, cron, kanban, RL"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "openai>=1.55.0",
    "google-generativeai>=0.8.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "httpx>=0.27.0",
    "aiohttp>=3.11.0",
    "websockets>=13.0",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.20.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "loguru>=0.7.2",
    "rich>=13.9.0",
    "typer>=0.15.0",
    "pyyaml>=6.0.2",
    "orjson>=3.10.0",
    "anyio>=4.6.0",
    "filelock>=3.16.0",
    "apscheduler>=3.10.0",
    "psutil>=6.1.0",
    "gitpython>=3.1.0",
    "mcp>=1.2.0",
    "duckduckgo-search>=3.9.0",
    "playwright>=1.40.0",
]

[project.optional-dependencies]
knowledge = [
    "sentence-transformers>=2.7.0",
    "faiss-cpu>=1.8.0",
    "pypdf2>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["icecode"]
