[project]
name = "icecode-gateway"
version = "2.0.0"
description = "ICECODE Gateway — multi-platform messaging adapter (WhatsApp, Telegram, Discord, Slack, and 16+ more)"
requires-python = ">=3.11"
dependencies = [
    "icecode-core>=2.0.0",
    "httpx>=0.27.0",
    "aiohttp>=3.11.0",
    "websockets>=13.0",
    "pyyaml>=6.0.2",
    "loguru>=0.7.2",
    "rich>=13.9.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
icecode-gateway = "icecode_gateway.run:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["icecode_gateway"]
