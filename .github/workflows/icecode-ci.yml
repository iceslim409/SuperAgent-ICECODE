name: ICECODE CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'pytest.ini'
      - '.github/workflows/icecode-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tests/**'

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pytest>=9.0" \
            "pytest-asyncio>=1.0" \
            "anyio>=4.6" \
            "openai>=1.55" \
            "fastapi>=0.115" \
            "httpx>=0.27" \
            "loguru>=0.7" \
            "pydantic>=2.9" \
            "pydantic-settings>=2.6" \
            "numpy>=1.24" \
            "faiss-cpu>=1.8" \
            "PyPDF2>=3.0" \
            "uvicorn>=0.29" \
            "websockets>=13.0" \
            "starlette>=0.40" \
            "anyio>=4.6"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short --no-header \
            -p no:warnings
        env:
          PYTHONPATH: packages/core:packages/server:packages/tools:packages/cli

      - name: Run integration tests (no external services)
        run: |
          python -m pytest tests/integration/ -v --tb=short --no-header \
            -p no:warnings \
            -m "not requires_server and not requires_ollama"
        env:
          PYTHONPATH: packages/core:packages/server:packages/tools:packages/cli
        continue-on-error: true

  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax (py_compile)
        run: |
          find packages/core/icecode packages/server/icecode_server -name "*.py" \
            | xargs python -m py_compile && echo "All Python files OK"

      - name: Check imports (server startup)
        run: |
          pip install fastapi loguru pydantic pydantic-settings uvicorn httpx openai anyio
          python -c "
          import sys
          sys.path.insert(0, 'packages/core')
          sys.path.insert(0, 'packages/server')
          from icecode_server.main import create_app
          app = create_app()
          print(f'Server OK — {len(list(app.routes))} routes registered')
          "
