version: "3.9"

services:
  icecode:
    build: .
    container_name: icecode-server
    ports:
      - "13210:13210"
    volumes:
      # Persist data outside the container
      - icecode-data:/root/.icecode
      # Mount .env for API keys (create from .env.example)
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/packages/core:/app/packages/server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13210/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: Ollama for local AI (comment out if using cloud APIs)
  ollama:
    image: ollama/ollama:latest
    container_name: icecode-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    profiles:
      - with-ollama   # start with: docker compose --profile with-ollama up

volumes:
  icecode-data:
  ollama-data:
